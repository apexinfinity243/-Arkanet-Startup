<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Arkanet</title>

    <link rel="stylesheet" href="css/register.css">

    <!-- LIB TEL INPUT -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h2>INSCRIPTION</h2>

    <form id="registerForm">

    <input type="text" id="nom" placeholder="Nom" required>
    <input type="text" id="postnom" placeholder="Post-nom" required>
    <input type="text" id="prenom" placeholder="Prénom" required>

    <input type="text" id="birthdate" placeholder="JJ/MM/AAAA" maxlength="10" required>

    <input type="text" id="lieu" placeholder="Lieu de naissance" required>

    <!-- NUMERO MONDIAL -->
    <input type="tel" id="phone" placeholder="Numéro de téléphone" required>

    <input type="email" id="email" placeholder="Gmail" required>

    <input type="password" id="password" placeholder="Mot de passe" required>
    <input type="password" id="confirmPassword" placeholder="Confirmer mot de passe" required>

    <button type="submit">S'inscrire</button>

    <p onclick="goLogin()">Déjà un compte ? Connexion</p>

    </form>

    <div id="message"></div>
</div>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script src="js/register.js"></script>

</body>
</html>
